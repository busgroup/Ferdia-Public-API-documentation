type: object
required:          
  - departureDate
  - departureTime
  - travelFrom
  - travelTo
  - pax        
  - acceptTerms  
properties:
  tripType:
    type: string
    enum:
      - OneWay
      - Return 
    default: OneWay
  departureDate:
    type: string
    format: date            
  departureTime:
    type: string
    pattern: '^(0[0-9]|1[0-9]|2[0-3]):[0-5][0-9]$'
  returnDate:
    type: string
    format: date
  returnTime:
    type: string
    pattern: '^(0[0-9]|1[0-9]|2[0-3]):[0-5][0-9]$'
  travelFrom:
    $ref: "./Location.yaml"
  travelTo:
    $ref: "./Location.yaml"
  pax:
    type: integer
    format: int32                         
  busAvailableDuringStay:
    type: boolean
    default: false
  comments:
    type: string          
  acceptTerms:
    type: boolean
  externalReference:
    type: string
