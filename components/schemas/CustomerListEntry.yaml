properties:
  id:
    type: integer
  number:
    type: string
  name:
    type: string
  email:
    type: string
    format: email
  invoiceEmail:
    type: string
    format: email
  invoiceMethod:
    type: string
    enum:
      - Email
      - Post
  invoiceReference:
    type: string
  type:
    $ref: "./CustomerType.yaml"
  orgno:
    type: string
  category:
    $ref: "./CustomerCategory.yaml"
  addresses:
    type: array
    items:
      $ref: "./Address.yaml"
  contactPersons:
    type: array
    items:
      $ref: "./ContactPerson.yaml"