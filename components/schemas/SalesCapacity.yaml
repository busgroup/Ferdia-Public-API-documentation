type: object
properties:
  capacity:
    type: string
    enum: 
      - High
      - Medium
      - Low
  departmentId:
    type: integer
  departmentName:
    type: string
  vehicletypeId:
    type: integer
  vehicleTypeName:
    type: string
  tripCount:
    type: object
    properties:
      total:
        type: integer
        example: 8
        description: The total number of trips in the timerange of the capacity request
      activeNormalTrips:
        type: integer
        example: 4
        description: The total number of active normal trips in the timerange of the capacity request
      activeFixedTrips:  
        type: integer
        example: 2
        description: The total number of active fixed trips in the timerange of the capacity request
      confirmedNormalTrips:
        type: integer
        example: 1
        description: The total number of confirmed normal trips in the timerange of the capacity request
      sentQuotations:
        type: integer
        example: 0
        description: The total number of quoted, but not accepted trips in the timerange of the capacity request
      drafts:
        type: integer
        example: 1
        description: The total number of draft trips in the timerange of the capacity request
  fullDayInfo:
    type: array
    items:
      type: object
      properties:
        startTime: 
          type: string
          format: date-time
          example: "01.01.2025 00:00"
        endTime: 
          type: string
          format: date-time
          example: "01.01.2025 01:00"
        capacity:
          type: string
          enum:
            - High
            - Medium
            - Low
        tripCount:
          type: object
          properties:
            total:
              type: integer
              example: 4
              description: The total number of trips in the timerange of the capacity request
            activeNormalTrips:
              type: integer
              example: 0
              description: The total number of active normal trips in the timerange of the capacity request
            activeFixedTrips:  
              type: integer
              example: 2
              description: The total number of active fixed trips in the timerange of the capacity request
            confirmedNormalTrips:
              type: integer
              example: 1
              description: The total number of confirmed normal trips in the timerange of the capacity request
            sentQuotations:
              type: integer
              example: 0
              description: The total number of quoted, but not accepted trips in the timerange of the capacity request
            drafts:
              type: integer
              example: 1
              description: The total number of draft trips in the timerange of the capacity request
