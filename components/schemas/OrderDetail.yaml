type: object
properties:
  orderId:
    type: string
    description: "The unique internal order ID"
    example: "34290"
  orderNumber:
    type: string
    description: "The order number as displayed in the TEQ UI"
    example: "BT-034150-S01"
  customerId:
    type: string
    description: "The ID of the customer this order belongs to"
    example: "1000"
  status:
    type: string
    description: "The current status of the order"
    example: "confirmed"
  trips:
    type: array
    description: "All trips (order lines) on this order"
    items:
      $ref: "./Trip.yaml"
