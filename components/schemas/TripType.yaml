properties:
  id:
    type: integer
    description: The ID of the trip type
    example: 1
  name:
    type: string
    description: The name of the trip type
    example: Standard
  category:
    type: string
    description: The category of the trip type
    example: NORMAL
  description:
    type: string
    description: The description of the trip type
    example: Standard trip type  
  tripPriority:
    type: integer
    description: The trip priority for trips of this type
    example: 50
  color:
    type: string
    format: hex-color
    description: The color for this trip type (hex color code)  
    example: "#FF5733"
  active:
    type: boolean
    description: Is this trip type active
    example: true
