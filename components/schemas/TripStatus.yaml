properties:
  status:
    type: string
    description: The status of the trip
    example: planning
  current_location:
    type: object
    description: The current location of the trip
    properties:
      latitude:
        type: number
        description: The latitude of the location
        example: 59.9133301
      longitude:
        type: number
        description: The longitude of the location
        example: 10.7389701
      address:
        type: string
        description: The address of the location
        example: "Storgata 1, 0164 Oslo"
