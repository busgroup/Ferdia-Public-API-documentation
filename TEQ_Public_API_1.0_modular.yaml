  /sales/customers/categories/{id}:
    $ref: './paths/sales-customers.yaml#/~1sales~1customers~1categories~1{id}'
  
  # Sales/Requests
  /sales/requests:
    $ref: './paths/sales-requests.yaml#/~1'
  /sales/requests/{customerId}:
    $ref: './paths/sales-requests.yaml#/~1sales~1requests~1{customerId}'
  
  # Sales/Orders
  /sales/orders/{customerId}:
    $ref: './paths/sales-orders.yaml#/~1sales~1orders~1{customerId}'
  /sales/orders/status/{id}:
    $ref: './paths/sales-orders.yaml#/~1sales~1orders~1status~1{id}'
  
  # Sales/Capacity
  /sales/capacity:
    $ref: './paths/sales-capacity.yaml#/~1sales~1capacity'
  
  # Core/Vehicles
  /core/vehicles:
    $ref: './paths/core-vehicles.yaml#/~1core~1vehicles'
  
  # Core/Employees
  /core/employees:
    $ref: './paths/core-employees.yaml#/~1core~1employees'
  /core/employees/calendar/{id}:
    $ref: './paths/core-employees.yaml#/~1core~1employees~1calendar~1{id}'

