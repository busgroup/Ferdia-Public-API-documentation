name: Ferdia Public API documentation CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for pushing to gh-pages branch
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4.0.0
        with:
          version: 9
          run_install: false
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
              ${{ runner.os }}-pnpm-store-
          
      - name: Install dependencies
        run: pnpm install @redocly/cli -g
      
      - name: Bundle modular OpenAPI files
        run: redocly bundle TEQ_Public_API_1.0_modular.yaml -o TEQ_Public_API.yaml
        
      - name: Generate documentation
        run: redocly build-docs TEQ_Public_API.yaml --template custom.hbs -o index.html

      - name: Convert to JSON
        run: redocly bundle TEQ_Public_API.yaml -o openapi.json
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          keep_files: true