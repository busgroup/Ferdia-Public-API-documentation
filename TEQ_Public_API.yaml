openapi: 3.0.0
info:
  version: '1.0'
  title: TEQ Public API
  x-logo:
    url: https://raw.githubusercontent.com/busgroup/Ferdia-Public-API-documentation/main/Ferdia-logo.png
    backgroundColor: '#FFFFFF'
    altText: TEQ Logo
  description: |
    # Introduction
    [comment]: <> (x-product-description-placeholder)
    With the TEQ API you can integrate your system with the TEQ platform. The API is designed to be easy to use and to provide a seamless integration experience.

    The TEQ API is built on HTTP and is RESTful.
    It has predictable resource URLs and returns HTTP response codes to indicate errors.
    It also accepts and returns JSON in the HTTP body.
    Use your favorite HTTP/REST library in your programming language when using this API.
    This API reference documentation contains the most commonly integrated resources.
    # Authentication
    The API uses OAuth2 for authentication. You will need to obtain an access token to use the API. The access token should be included in the Authorization header of each request.
    To obtain your access credentials, please contact TEQ support on (support@ferdia.co).
    ## OAuth 2.0 flow
    The Authentication supports OAuth 2.0 Client Credentials flow
    ## Authentication-endpoints:
    Token-endpoint: **https://auth.api.ferdia.app/oauth2/token**
    # Domain-header
    For all API requests an HTTP-header `domain` must be included. This header should contain the domain/company name that the API-call should be directed to.  You will receive this domain name when you sign up for the TEQ API.
    # TimeZone
    The API uses the timezone of the client of the request to calculate dates and times. The timezone should be included in the HTTP-header `TimeZone` in the format `Continent/City` (e.g. `Europe/Berlin`).
paths:
  /trips/trips:
    get:
      summary: Returns a list of trips
      description: Returns a list of trips based on the filters provided
      tags:
        - Operations/Trips
      parameters:
        - $ref: '#/components/parameters/domain'
        - in: query
          name: triptype
          schema:
            type: string
          description: Trip type
          examples:
            normal:
              summary: Normal trips
              value: normal
            vip:
              summary: VIP trips
              value: vip
            airport:
              summary: Airport trips
              value: airport
        - in: query
          name: status
          schema:
            type: string
          description: Trip status
          examples:
            planning:
              summary: Planning
              value: planning
            running:
              summary: running
              value: running
            closed:
              summary: Closed
              value: closed
        - in: query
          name: department
          schema:
            type: integer
          description: The trip department Id
          example: 1
        - in: query
          name: fromDate
          schema:
            type: string
            format: date
          description: From Date
          example: '2026-03-01'
        - in: query
          name: toDate
          schema:
            type: string
            format: date
          description: To Date
          example: '2026-03-02'
        - in: query
          name: customerId
          schema:
            type: integer
          description: The Id of the customer for the trip
          example: 1000
        - in: query
          name: driverId
          schema:
            type: integer
          description: The Id of the driver assigned to the trip
          example: 251
        - in: query
          name: vehicleId
          schema:
            type: integer
          description: The Id of the vehicle assigned to the trip
          example: 9
      responses:
        '200':
          description: Successfully returned a list of trips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TripList'
        '400':
          $ref: '#/components/responses/400'
  /trips/trips/{id}:
    get:
      summary: Returns a single trip
      description: Returns a single trip
      tags:
        - Operations/Trips
      parameters:
        - $ref: '#/components/parameters/domain'
        - name: id
          in: path
          description: Trip Id
          required: true
          schema:
            type: string
          example: TQ-001001-S01-N001
      responses:
        '200':
          description: Successfully returned a trip
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
  /trips/tripstatus/{id}:
    get:
      summary: Gets the current status of a trip
      description: Gets the current status of a trip
      tags:
        - Operations/Trips
      parameters:
        - $ref: '#/components/parameters/domain'
        - name: id
          in: path
          description: Trip Id
          required: true
          schema:
            type: string
          example: TE-0000001-S01-N001
      responses:
        '200':
          description: Successfully returned trip status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripStatus'
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
  /sales/customers:
    post:
      summary: Creates a new customer
      description: Creates a new customer
      tags:
        - Sales/Customers
      parameters:
        - $ref: '#/components/parameters/domain'
      requestBody:
        description: Customer data
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostCustomer'
      responses:
        '201':
          description: Successfully created customer
          headers:
            Location:
              description: Returns the Location to get the created Customer in TEQ UI.
              schema:
                type: string
                example: /sales/customers/details/0001
          content:
            application/json:
              schema:
                type: object
                properties:
                  customerId:
                    type: string
        '400':
          $ref: '#/components/responses/400'
    get:
      summary: Returns a list of customers
      description: Returns a list of customers based on the filters provided
      tags:
        - Sales/Customers
      parameters:
        - $ref: '#/components/parameters/domain'
        - in: query
          name: type
          schema:
            $ref: '#/components/schemas/CustomerType'
        - in: query
          name: name
          schema:
            type: string
        - in: query
          name: email
          schema:
            type: string
        - in: query
          name: orgno
          schema:
            type: string
        - in: query
          name: freetext
          schema:
            type: string
      responses:
        '200':
          description: Successfully returned a list of customers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerList'
        '400':
          $ref: '#/components/responses/400'
  /sales/customers/{id}:
    put:
      description: Updates an existing customer
      tags:
        - Sales/Customers
      parameters:
        - $ref: '#/components/parameters/domain'
        - name: id
          in: path
          description: Customer ID
          required: true
          schema:
            type: integer
      requestBody:
        description: Customer data
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutCustomer'
      responses:
        '200':
          description: Successfully updated customer
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
  /sales/customers/{id}/fixedtripsinfo:
    get:
      summary: Returns a list of fixed trips for a customer
      description: Returns a list of fixed trips for a customer based on the filters provided
      tags:
        - Sales/Customers
      parameters:
        - $ref: '#/components/parameters/domain'
        - $ref: '#/components/parameters/timezone'
        - name: id
          in: path
          description: Customer ID
          required: true
          schema:
            type: integer
        - name: date
          in: query
          description: Date to get fixed trips for
          schema:
            type: string
            format: date
            default: today
      responses:
        '200':
          description: Successfully returned a list of fixed trips for a customer
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomerFixedTripInfo'
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
  /sales/requests:
    post:
      summary: Create a new Request
      description: Creats a new Request in the system
      tags:
        - Sales/Requests
      parameters:
        - $ref: '#/components/parameters/domain'
        - $ref: '#/components/parameters/timezone'
      requestBody:
        description: Request data
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostRequest'
      responses:
        '201':
          description: Request created
          headers:
            Location:
              description: Returns the Location to get the created Request in TEQ UI.
              schema:
                type: string
                example: /sales/request/new/TT-000001
          content:
            application/json:
              schema:
                type: object
                properties:
                  requestId:
                    type: string
                  customerId:
                    type: string
        '400':
          $ref: '#/components/responses/400'
  /sales/requests/{customerId}:
    post:
      summary: Create a new Request for a given customer
      description: Create a new Request for a given customer
      tags:
        - Sales/Requests
      parameters:
        - $ref: '#/components/parameters/domain'
        - $ref: '#/components/parameters/timezone'
        - name: customerId
          in: path
          description: existing customer Id
          required: true
          schema:
            type: integer
      requestBody:
        description: Request data
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostRequestGivenCustomer'
      responses:
        '201':
          description: Request created
          headers:
            Location:
              description: Returns the Location to get the created Request in TEQ UI.
              schema:
                type: string
                example: /sales/request/new/TT-000001
          content:
            application/json:
              schema:
                type: object
                properties:
                  requestId:
                    type: string
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
  /sales/orders/{customerId}:
    post:
      summary: Create a new Order for a given customer
      description: Creats a new Order in the system
      tags:
        - Sales/Orders
      parameters:
        - $ref: '#/components/parameters/domain'
        - $ref: '#/components/parameters/timezone'
        - name: customerId
          in: path
          description: existing customer Id
          required: true
          schema:
            type: integer
      requestBody:
        description: Request data
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostOrder'
      responses:
        '201':
          description: Order created
          headers:
            Location:
              description: Returns the Location to get the created Order in TEQ UI.
              schema:
                type: string
                example: /sales/quotations/0001
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: The status of the operation
                    example: success
                  orderId:
                    type: string
                    description: The unique internal order ID created
                    example: '34290'
                  gen_oid:
                    type: string
                    description: The order ID in the format used in TEQ UI, e.g. BT-034150-S01
                    example: BT-034150-S01
                  createdRows:
                    type: integer
                    description: The number of rows created
                    example: 1
        '400':
          $ref: '#/components/responses/400'
        '404':
          description: The given customer does not exist
  /sales/orders/status/{id}:
    get:
      description: Returns the status for a given order and the status of all trips related to this order
      tags:
        - Sales/Orders
      parameters:
        - $ref: '#/components/parameters/domain'
        - name: id
          in: path
          description: Order ID
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Successfully returned status for the order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderStatus'
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
  /sales/capacity:
    get:
      description: Returns the vehicle capacity for a given time
      tags:
        - Sales/Capacity
      parameters:
        - $ref: '#/components/parameters/domain'
        - name: startTime
          in: query
          description: The start-time for the trip. Format DD.MM.YYYY HH:MM
          required: true
          example: 01.01.2025 10:00
          schema:
            type: string
        - name: endTime
          in: query
          description: The end-time for the trip. Format DD.MM.YYYY HH:MM
          required: true
          example: 01.01.2025 12:00
          schema:
            type: string
        - name: departmentId
          in: query
          description: Id of the department to get the capacity for
          schema:
            type: integer
        - name: vehicleTypeId
          in: query
          description: Id of the vehicle type to get the capacity for
          schema:
            type: integer
        - name: pax
          in: query
          description: The number of passengers to get the capacity for, vehicle type will be set to default based on the number of passengers
          schema:
            type: integer
      responses:
        '200':
          description: Successfully returned sales capacity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalesCapacity'
        '400':
          $ref: '#/components/responses/400'
  /core/vehicles:
    get:
      description: Returns a list of vehicles
      tags:
        - Core/Vehicles
      parameters:
        - $ref: '#/components/parameters/domain'
      responses:
        '200':
          description: Successfully returned a list of vehicles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Vehicle'
        '400':
          $ref: '#/components/responses/400'
  /core/employees:
    get:
      description: Returns returns a list of employees
      tags:
        - Core/Employees
      parameters:
        - $ref: '#/components/parameters/domain'
        - in: query
          name: name
          schema:
            type: string
          description: Name of the employee
        - in: query
          name: number
          schema:
            type: integer
          description: Employee number
      responses:
        '200':
          description: Successfully returned employee list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Employee'
        '400':
          $ref: '#/components/responses/400'
  /core/employees/calendar/{id}:
    get:
      description: Returns calendar entries for an employee
      tags:
        - Core/Employees
      parameters:
        - $ref: '#/components/parameters/domain'
        - $ref: '#/components/parameters/timezone'
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The ID of the employee
        - in: query
          name: start
          schema:
            type: string
            format: date
          description: Start date for the calendar range (YYYY-MM-DD)
        - in: query
          name: end
          schema:
            type: string
            format: date
          description: End date for the calendar range (YYYY-MM-DD)
      responses:
        '200':
          description: Successfully returned employee calendar
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EmployeeCalendarEntry'
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
  /core/settings/triptypes:
    get:
      description: Returns a list of trip types
      tags:
        - Core/Settings
      parameters:
        - $ref: '#/components/parameters/domain'
      responses:
        '200':
          description: Successfully returned a list of trip types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TripType'
        '400':
          $ref: '#/components/responses/400'
components:
  responses:
    '400':
      description: Invalid request
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              errors:
                type: array
                items:
                  properties:
                    error:
                      type: string
            example:
              message: Invalid request, please review the errors and retry the request
    '404':
      description: Not found
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
            example:
              message: The requested object does not exist
    404_notFound:
      $ref: '#/components/responses/404'
    400_requestError:
      $ref: '#/components/responses/400'
  parameters:
    domainParameter:
      $ref: '#/components/parameters/domain'
    timezoneParameter:
      $ref: '#/components/parameters/timezone'
    domain:
      name: domain
      in: header
      description: The domain/company to direct the API-call to
      required: true
      schema:
        type: string
        example: ferdia
    timezone:
      in: header
      name: TimeZone
      description: The timezone of the client of the request
      required: false
      schema:
        type: string
        example: Europe/Berlin
  schemas:
    CustomerType:
      type: string
      enum:
        - person
        - organization
    Address:
      properties:
        address1:
          type: string
          description: Address 1
          example: Rådhusplassen 1, 0037 Oslo, Norway
        postcode:
          type: string
          description: Postcode
          example: 37
        city:
          type: string
          description: City
          example: Oslo
        country:
          type: string
          description: Country
          example: Norway
    CustomerAddress:
      properties:
        address1:
          type: string
        postcode:
          type: string
        city:
          type: string
        country:
          type: string
        isInvoiceAddress:
          type: boolean
          description: This field defines if this address should be used as the invoice address for the customer. When creating a new customer, one address must be marked as the invoice address
    ContactPerson:
      properties:
        id:
          type: integer
        firstname:
          type: string
        lastname:
          type: string
        email:
          type: string
          format: email
        mobilePhone:
          type: string
        fixedPhone:
          type: string
        primaryContact:
          type: boolean
        roleInCompany:
          type: string
    NewContactPerson:
      properties:
        firstname:
          type: string
          description: The firstname of the contactperson
          example: John
        lastname:
          type: string
          description: The lastname of the contactperson
          example: Doe
        email:
          type: string
          format: email
          description: The email of the contact-person. This is used to validate unique contacts, if a contact with the same email is found the existing contact will be used.
          example: john.doe@mail.com
        mobilePhone:
          type: string
          description: The Mobilephone of the contact person
          example: 479911223344
        fixedPhone:
          type: string
          description: The fixed phone of the contact person
          example: 479911223344
        primaryContact:
          type: boolean
          description: Should this contact be set as the primary contact for the customer
        roleInCompany:
          type: string
          description: The role this contactperson has with the customer
          example: Manager
    CustomerCategory:
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        active:
          type: boolean
        default:
          type: boolean
    Customer:
      properties:
        id:
          type: integer
        customerNumber:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        type:
          $ref: '#/components/schemas/CustomerType'
        orgno:
          type: string
        category:
          $ref: '#/components/schemas/CustomerCategory'
        addresses:
          type: array
          items:
            $ref: '#/components/schemas/Address'
        contactPersons:
          type: array
          items:
            $ref: '#/components/schemas/ContactPerson'
    PostCustomer:
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        selectAsInvoiceEmail:
          type: boolean
        invoiceEmail:
          type: string
          format: email
        type:
          $ref: '#/components/schemas/CustomerType'
        orgno:
          type: string
        category:
          $ref: '#/components/schemas/CustomerCategory'
        customerNumber:
          type: string
        parentCustomerId:
          type: integer
        address1:
          $ref: '#/components/schemas/CustomerAddress'
        address2:
          $ref: '#/components/schemas/CustomerAddress'
        notes:
          type: string
        paymentType:
          type: string
          enum:
            - Invoice
            - Vipps
            - Cash
            - Card
        deadline:
          type: integer
        creditLimit:
          type: integer
        invoiceMethod:
          type: string
          enum:
            - Email
            - Post
        purchaseOrder:
          type: string
        language:
          type: string
          enum:
            - Norwegian
            - English
            - Swedish
            - Danish
        currency:
          type: string
          enum:
            - NOK
            - SEK
            - DKK
            - EUR
            - USD
            - GBP
            - BDT
        EAN:
          type: string
        VATNumber:
          type: string
        includeVAT:
          type: boolean
        displayVAT:
          type: boolean
        fixedDiscountPercentage:
          type: number
        contactPersons:
          type: array
          items:
            $ref: '#/components/schemas/NewContactPerson'
    PutCustomer:
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        type:
          $ref: '#/components/schemas/CustomerType'
        orgno:
          type: string
        category:
          $ref: '#/components/schemas/CustomerCategory'
        customerNumber:
          type: string
        parentCustomerId:
          type: integer
        orgNumber:
          type: string
        address1:
          $ref: '#/components/schemas/Address'
        address2:
          $ref: '#/components/schemas/Address'
        notes:
          type: string
        paymentType:
          type: string
          enum:
            - Invoice
            - Vipps
            - Cash
            - Card
        deadline:
          type: integer
        creditLimit:
          type: integer
        invoiceMethod:
          type: string
          enum:
            - Email
            - Post
        purchaseOrder:
          type: string
        language:
          type: string
          enum:
            - Norwegian
            - English
            - Swedish
            - Danish
        currency:
          type: string
          enum:
            - NOK
            - SEK
            - DKK
            - EUR
            - USD
            - GBP
            - BDT
        EAN:
          type: string
        VATNumber:
          type: string
        includeVAT:
          type: boolean
        fixedDiscountPercentage:
          type: number
        contactPersons:
          type: array
          items:
            $ref: '#/components/schemas/ContactPerson'
    CustomerFixedTripInfo:
      properties:
        emergency_phone_company_name:
          type: string
        emergency_phone_number:
          type: string
        fixed-trips:
          type: array
          items:
            properties:
              status:
                type: string
              from:
                type: string
              planned-withdrawal-time:
                type: string
                format: date-time
              actual-withdrawal-time:
                type: string
                format: date-time
              pax:
                type: integer
              to:
                type: string
              planned-deliver-time:
                type: string
                format: date-time
              actual-deliver-time:
                type: string
                format: date-time
    CustomerList:
      properties:
        count:
          type: integer
          description: Total number of results
          example: 552
        next:
          type: string
          description: URL to get next page of results
          example: http://api.ferdia.app/publicapi/sales/customers?page=3
        previous:
          type: string
          description: URL to get previous page of results
          example: http://api.ferdia.app/publicapi/sales/customers?page=1
        results:
          type: array
          items:
            $ref: '#/components/schemas/CustomerListEntry'
    GeoLocation:
      properties:
        lat:
          type: number
          description: The latitude of the location
          example: 59.9133301
        long:
          type: number
          description: The longfitude of the location
          example: 10.7389701
    Location:
      properties:
        geoLocation:
          $ref: '#/components/schemas/GeoLocation'
        address:
          $ref: '#/components/schemas/Address'
        googleFormattedAddress:
          type: string
          description: The google-formatted address
          example: Oslo rådhus, Rådhusplassen 1, Vika, Sentrum, Oslo, 0160, Norway
    ViaPoint:
      properties:
        location:
          $ref: '#/components/schemas/Location'
        pauseTimeInMinutes:
          type: integer
    Garage:
      properties:
        id:
          type: string
        name:
          type: string
        location:
          $ref: '#/components/schemas/Location'
    TripExecution:
      properties:
        action:
          type: string
          description: The action for this execution step
          example: Withdrawal garage (A)
        plannedTime:
          type: string
          description: The planned time for this step
          example: '2026-04-28T16:00:00'
        actualTime:
          type: string
          description: The actual time for this step
          example: '2026-04-28T16:00:00'
        status:
          type: string
          description: The status of this step
          example: Critical
        plannedDistance:
          type: number
          description: The planned distance for this step
